services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: aira-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017/tcp"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Qdrant ────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333/tcp"
      - "127.0.0.1:6334:6334/tcp"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - app-network

  # ── WAHA (WhatsApp HTTP API + GOWS engine) ─────────────────────────────────
  waha:
    build:
      context: ./waha-plus
      dockerfile: Dockerfile
      additional_contexts:
        gows_src: ./gows
    container_name: waha
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000/tcp"
    volumes:
      - "./waha-plus/media:/app/.media"
      - waha_sessions:/app/.sessions
    env_file:
      - .env                                          # single source of truth
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/3000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  # ── aira-relay (Python MCP server) ────────────────────────────────────────
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aira-relay
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MCP_PORT:-8000}:${MCP_PORT:-8000}/tcp"   # MCP HTTP  → Claude Desktop connects here
      - "127.0.0.1:${WEBHOOK_PORT:-8001}:${WEBHOOK_PORT:-8001}/tcp"   # Webhook   ← WAHA posts events here
      - "127.0.0.1:${DEBUGPY_PORT:-5678}:${DEBUGPY_PORT:-5678}/tcp"   # debugpy   ← VSCode attaches here
    env_file:
      - .env                                          # single source of truth
    environment:
      - DEBUGPY_ENABLE=${DEBUGPY_ENABLE:-false}
      - DEBUGPY_WAIT_FOR_CLIENT=${DEBUGPY_WAIT_FOR_CLIENT:-false}
      - QDRANT_URL=http://qdrant:6333

    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      waha:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mongodb_data: {}
  qdrant_storage: {}
  waha_sessions: {}

networks:
  app-network: {}
