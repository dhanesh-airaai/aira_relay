services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: aira-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017/tcp"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── WAHA (WhatsApp HTTP API + GOWS engine) ─────────────────────────────────
  waha:
    build:
      context: ./waha-plus
      dockerfile: Dockerfile
      additional_contexts:
        gows_src: ./gows
    container_name: waha
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000/tcp"
    volumes:
      - "./waha-plus/media:/app/.media"
    env_file:
      - .env                                          # single source of truth
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy

  # ── aira-relay (Python MCP server) ────────────────────────────────────────
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aira-relay
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MCP_PORT:-8000}:${MCP_PORT:-8000}/tcp"   # MCP HTTP  → Claude Desktop connects here
      - "127.0.0.1:${WEBHOOK_PORT:-8001}:${WEBHOOK_PORT:-8001}/tcp"   # Webhook   ← WAHA posts events here
      - "127.0.0.1:5678:5678/tcp"                              # debugpy   ← VSCode attaches here
    env_file:
      - .env                                          # single source of truth
    environment:
      - DEBUGPY_ENABLE=${DEBUGPY_ENABLE:-false}
      - DEBUGPY_WAIT_FOR_CLIENT=${DEBUGPY_WAIT_FOR_CLIENT:-false}

    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - waha
      - mongodb

volumes:
  mongodb_data: {}
