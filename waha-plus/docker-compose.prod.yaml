# Production compose - uses Azure PostgreSQL, no local containers
# Run with: docker compose -f docker-compose.prod.yaml up --build
services:
  waha:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.prod

    dns:
      - 1.1.1.1
      - 8.8.8.8

    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'

    ports:
      - '3000:3000/tcp'

    env_file:
      - .env.prod
